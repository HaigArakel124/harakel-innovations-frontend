<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harakel — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#18181f; --surface3:#1e1e28;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f0f5; --text2:#9090a8; --text3:#5a5a72;
  --accent:#6c63ff; --accent2:#8b84ff; --accent-glow:rgba(108,99,255,0.18);
  --green:#00d9a3; --green-dim:rgba(0,217,163,0.12);
  --amber:#ffb547; --amber-dim:rgba(255,181,71,0.12);
  --pink:#ff6b9d; --pink-dim:rgba(255,107,157,0.12);
  --blue:#4da6ff; --blue-dim:rgba(77,166,255,0.12);
  --radius:14px; --radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.login-card{width:100%;max-width:400px;padding:40px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);}
.login-logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.form-group input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.form-group input:focus{border-color:var(--accent);}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;width:100%;padding:12px;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.error-msg{background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.3);color:var(--pink);font-size:13px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:16px;display:none;}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.portal-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.biz-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.topbar-divider{width:1px;height:20px;background:var(--border2);}
.content{padding:28px;max-width:1100px;margin:0 auto;}
.page-heading{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.stat-card.green{border-color:rgba(0,217,163,0.2);background:linear-gradient(135deg,var(--surface),rgba(0,217,163,0.04));}
.stat-card.accent{border-color:rgba(108,99,255,0.2);background:linear-gradient(135deg,var(--surface),rgba(108,99,255,0.04));}
.stat-card.amber{border-color:rgba(255,181,71,0.2);background:linear-gradient(135deg,var(--surface),rgba(255,181,71,0.04));}
.stat-icon{font-size:18px;margin-bottom:10px;}
.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:2px;}
.stat-label{font-size:12px;color:var(--text3);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* ── LEADS TABLE ── */
.lead-row{display:grid;grid-template-columns:1fr 1fr 110px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center;}
.lead-row:last-child{border-bottom:none;}
.lead-name{font-weight:500;}
.lead-email{color:var(--text2);font-size:12px;}
.lead-status{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.status-new{background:var(--blue-dim);color:var(--blue);}
.status-hot{background:rgba(255,107,157,0.12);color:var(--pink);}
.status-warm{background:var(--amber-dim);color:var(--amber);}
.status-booked{background:var(--green-dim);color:var(--green);}

/* ── APPOINTMENTS ── */
.appt-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.appt-row:last-child{border-bottom:none;}
.appt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.appt-time{font-size:11px;color:var(--text3);min-width:52px;}

/* ── CHATBOT STATUS ── */
.bot-status{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--surface2);border-radius:var(--radius-sm);}
.bot-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.bot-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
.bot-dot.off{background:var(--text3);}

/* ── EMPTY STATE ── */
.empty{font-size:13px;color:var(--text3);padding:16px 0;text-align:center;}

/* ── COMPETITOR INTEL ── */
.search-wrap{position:relative;}
.search-row{display:flex;gap:8px;}
.search-row input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.search-row input:focus{border-color:var(--accent);}
.search-row button{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.search-row button:disabled{opacity:0.5;cursor:not-allowed;}
.search-results{margin-top:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);max-height:280px;overflow-y:auto;}
.search-result{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.12s;}
.search-result:last-child{border-bottom:none;}
.search-result:hover{background:var(--surface3);}
.search-result-info{flex:1;min-width:0;}
.search-result-name{font-size:13px;font-weight:500;color:var(--text);}
.search-result-meta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-result-add{padding:5px 12px;background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(108,99,255,0.35);border-radius:6px;font-size:11px;font-weight:600;}
.comp-row{display:grid;grid-template-columns:1fr 70px 90px 30px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:center;}
.comp-row:last-child{border-bottom:none;}
.comp-name{font-weight:500;}
.comp-meta{font-size:11px;color:var(--text3);}
.comp-rating{font-weight:600;}
.comp-remove{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:4px 6px;border-radius:4px;}
.comp-remove:hover{color:var(--pink);background:rgba(255,107,157,0.08);}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;}
.cmp-table th{text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);padding:10px 12px;border-bottom:1px solid var(--border);}
.cmp-table td{padding:12px;border-bottom:1px solid var(--border);}
.cmp-table tr:last-child td{border-bottom:none;}
.cmp-table tr.is-self{background:var(--accent-glow);}
.cmp-table tr.is-self td:first-child{color:var(--accent2);font-weight:600;}
.cmp-name-cell{display:flex;align-items:center;gap:8px;}
.self-badge{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;padding:2px 6px;background:var(--accent);color:#fff;border-radius:4px;font-weight:700;}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;margin-left:6px;padding:2px 6px;border-radius:4px;}
.delta.up{color:var(--green);background:var(--green-dim);}
.delta.down{color:var(--pink);background:rgba(255,107,157,0.12);}
.delta.flat{color:var(--text3);background:var(--surface3);}
.muted{color:var(--text3);}

/* ── LOADING ── */
.skeleton{background:var(--surface2);border-radius:6px;height:14px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:0.8;}}

@media(max-width:680px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .grid-2{grid-template-columns:1fr;}
  .lead-row{grid-template-columns:1fr 100px;}
  .lead-email{display:none;}
}
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Harakel</div>
    <div class="login-sub">Client Portal</div>
    <div class="error-msg" id="login-error"></div>
    <form onsubmit="submitLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@yourbusiness.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••••" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn" style="margin-top:8px;">Sign in</button>
    </form>
  </div>
</div>

<!-- ═══════ DASHBOARD ═══════ -->
<div id="dashboard">
  <header class="topbar">
    <div class="topbar-left">
      <span class="portal-logo">Harakel</span>
      <div class="topbar-divider"></div>
      <span class="biz-name" id="dash-biz-name">Loading...</span>
    </div>
    <button class="btn btn-ghost" style="font-size:12px;" onclick="logout()">Sign out</button>
  </header>

  <div class="content">
    <div class="page-heading" id="dash-heading">Welcome back</div>
    <div class="page-sub">Here's what's happening with your business today.</div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-icon">◉</div>
        <div class="stat-value" id="stat-leads">—</div>
        <div class="stat-label">Total leads</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">◷</div>
        <div class="stat-value" id="stat-appts">—</div>
        <div class="stat-label">Appointments</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-icon">◌</div>
        <div class="stat-value" id="stat-bot">—</div>
        <div class="stat-label">Chatbot status</div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Recent Leads -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Recent Leads</div>
        </div>
        <div id="leads-list"><div class="skeleton" style="margin-bottom:10px;"></div><div class="skeleton" style="width:70%;"></div></div>
      </div>

      <!-- Upcoming Appointments -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Upcoming Appointments</div>
        </div>
        <div id="appts-list"><div class="skeleton" style="margin-bottom:10px;"></div><div class="skeleton" style="width:60%;"></div></div>
      </div>
    </div>

    <!-- Chatbot -->
    <div class="card">
      <div class="card-header"><div class="card-title">AI Chatbot</div></div>
      <div id="bot-status-wrap">
        <div class="skeleton" style="height:46px;border-radius:8px;"></div>
      </div>
    </div>

    <!-- Competitor Intel -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Competitor Intel</div>
        <button class="btn btn-ghost" style="font-size:11px;padding:6px 12px;" onclick="refreshCompetitors()" id="comp-refresh-btn">Refresh data</button>
      </div>

      <div class="search-wrap" style="margin-bottom:18px;">
        <div class="search-row">
          <input id="comp-search-input" placeholder="Search a competitor by name or address..." onkeydown="if(event.key==='Enter')searchCompetitors()">
          <button id="comp-search-btn" onclick="searchCompetitors()">Search</button>
        </div>
        <div id="comp-search-results"></div>
      </div>

      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:8px;">Tracked competitors</div>
      <div id="comp-list">
        <div class="empty">Loading...</div>
      </div>

      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin:22px 0 8px;">Side-by-side comparison</div>
      <div id="comp-table-wrap" style="overflow-x:auto;">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script>
var API = 'https://web-production-608a8.up.railway.app';

// ── JWT payload decoder (no signature verification — server does that) ──
function _parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  } catch(e) { return null; }
}

// ── Auth ────────────────────────────────────────────────────
async function submitLogin(e) {
  e.preventDefault();
  var errEl = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    var res = await fetch(API + '/api/client-auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email:    document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value,
      }),
    });
    if (res.status === 401) throw new Error('Invalid email or password.');
    if (!res.ok) throw new Error('Server error — please try again.');
    var data = await res.json();
    localStorage.setItem('client_token', data.access_token);
    showDashboard(data.client);
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}

function logout() {
  localStorage.removeItem('client_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-btn').textContent = 'Sign in';
  document.getElementById('login-btn').disabled = false;
}

// ── Dashboard ────────────────────────────────────────────────
function showDashboard(clientInfo) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  var name = (clientInfo && clientInfo.business_name) || 'Your Business';
  document.getElementById('dash-biz-name').textContent = name;
  document.getElementById('dash-heading').textContent  = 'Welcome back, ' + name;
  loadDashboardData(clientInfo.client_id, clientInfo);
}

async function loadDashboardData(clientId, clientInfo) {
  loadCompetitors(clientId);
  // Fetch me (for modules/chatbot status) + leads + appointments in parallel
  var [meRes, leadsRes, apptsRes] = await Promise.allSettled([
    fetch(API + '/api/client-auth/me', {
      headers: {'Authorization': 'Bearer ' + localStorage.getItem('client_token')},
    }),
    fetch(API + '/api/leads/' + clientId + '?limit=5'),
    fetch(API + '/api/appointments/' + clientId),
  ]);

  // ── Leads ──
  var leadsEl = document.getElementById('leads-list');
  var statLeads = document.getElementById('stat-leads');
  if (meRes.status === 'fulfilled' && meRes.value && meRes.value.status === 401) {
    logout(); return;
  }
  if (leadsRes.status === 'fulfilled' && leadsRes.value.ok) {
    var ld = await leadsRes.value.json();
    var leads = ld.leads || [];
    statLeads.textContent = ld.count !== undefined ? ld.count : leads.length;
    if (leads.length === 0) {
      leadsEl.innerHTML = '<div class="empty">No leads yet — your chatbot is ready to capture them.</div>';
    } else {
      leadsEl.innerHTML = leads.map(function(l) {
        var statusCls = {new:'status-new',hot:'status-hot',warm:'status-warm',booked:'status-booked'}[l.status] || 'status-new';
        return '<div class="lead-row">' +
          '<div><div class="lead-name">' + (l.name || 'Unknown') + '</div><div class="lead-email">' + (l.email || '') + '</div></div>' +
          '<div class="lead-email">' + (l.phone || '') + '</div>' +
          '<div><span class="lead-status ' + statusCls + '">' + (l.status || 'new') + '</span></div>' +
        '</div>';
      }).join('');
    }
  } else {
    leadsEl.innerHTML = '<div class="empty">Could not load leads.</div>';
  }

  // ── Appointments ──
  var apptsEl  = document.getElementById('appts-list');
  var statAppts = document.getElementById('stat-appts');
  var dotColors = ['var(--green)','var(--accent)','var(--amber)','var(--pink)','var(--blue)'];
  if (apptsRes.status === 'fulfilled' && apptsRes.value.ok) {
    var ad = await apptsRes.value.json();
    var appts = ad.appointments || [];
    statAppts.textContent = ad.count !== undefined ? ad.count : appts.length;
    var now = Date.now();
    var upcoming = appts.filter(function(a) {
      return a.scheduled_time && new Date(a.scheduled_time).getTime() >= now;
    }).slice(0, 5);
    if (upcoming.length === 0) {
      apptsEl.innerHTML = '<div class="empty">No upcoming appointments.</div>';
    } else {
      apptsEl.innerHTML = upcoming.map(function(a, i) {
        var d = new Date(a.scheduled_time);
        var timeStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' +
                      d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        return '<div class="appt-row">' +
          '<div class="appt-dot" style="background:' + dotColors[i % dotColors.length] + '"></div>' +
          '<div style="flex:1;">' +
            '<div style="font-weight:500;">' + (a.customer_name || 'Appointment') + '</div>' +
            '<div style="font-size:11px;color:var(--text3);">' + (a.appointment_type || 'Meeting') + '</div>' +
          '</div>' +
          '<div class="appt-time">' + timeStr + '</div>' +
        '</div>';
      }).join('');
    }
  } else {
    apptsEl.innerHTML = '<div class="empty">Could not load appointments.</div>';
  }

  // ── Chatbot status ──
  var botWrap = document.getElementById('bot-status-wrap');
  var statBot = document.getElementById('stat-bot');
  var chatbotActive = false;
  if (meRes.status === 'fulfilled' && meRes.value.ok) {
    var me = await meRes.value.json();
    chatbotActive = !!(me.modules && me.modules.chatbot);
  } else if (clientInfo && clientInfo.modules) {
    chatbotActive = !!clientInfo.modules.chatbot;
  }
  statBot.textContent = chatbotActive ? 'Live' : 'Off';
  botWrap.innerHTML = '<div class="bot-status">' +
    '<div class="bot-dot ' + (chatbotActive ? 'live' : 'off') + '"></div>' +
    '<div>' +
      '<div style="font-size:13px;font-weight:500;">' + (chatbotActive ? 'Chatbot is live' : 'Chatbot is inactive') + '</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:2px;">' +
        (chatbotActive ? 'Capturing leads 24/7 on your website' : 'Contact your account manager to activate') +
      '</div>' +
    '</div>' +
  '</div>';
}

// ── Competitor Intel ─────────────────────────────────────────
var COMP_CLIENT_ID = null;

function _esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function _fmtRating(r) { return (r == null) ? '—' : Number(r).toFixed(1); }
function _fmtCount(n)  { return (n == null) ? '—' : Number(n).toLocaleString(); }

function _delta(n, suffix) {
  if (n == null) return '<span class="delta flat">—</span>';
  if (n === 0) return '<span class="delta flat">±0' + (suffix || '') + '</span>';
  if (n > 0) return '<span class="delta up">↑ ' + (Math.abs(n) % 1 === 0 ? n : n.toFixed(2)) + (suffix || '') + '</span>';
  return '<span class="delta down">↓ ' + (Math.abs(n) % 1 === 0 ? Math.abs(n) : Math.abs(n).toFixed(2)) + (suffix || '') + '</span>';
}

async function searchCompetitors() {
  var input = document.getElementById('comp-search-input');
  var btn = document.getElementById('comp-search-btn');
  var resultsEl = document.getElementById('comp-search-results');
  var query = input.value.trim();
  if (!query) return;
  btn.disabled = true; btn.textContent = 'Searching...';
  resultsEl.innerHTML = '';
  try {
    var res = await fetch(API + '/api/competitors/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query: query}),
    });
    if (!res.ok) throw new Error('Search failed');
    var data = await res.json();
    if (!data.results || data.results.length === 0) {
      resultsEl.innerHTML = '<div class="search-results"><div class="search-result"><div class="search-result-info"><div class="muted">No results found.</div></div></div></div>';
      return;
    }
    resultsEl.innerHTML = '<div class="search-results">' + data.results.map(function(r){
      var meta = [];
      if (r.rating != null) meta.push('★ ' + _fmtRating(r.rating));
      if (r.review_count != null) meta.push(_fmtCount(r.review_count) + ' reviews');
      if (r.address) meta.push(r.address);
      return '<div class="search-result" data-place-id="' + _esc(r.place_id) + '" data-name="' + _esc(r.name) + '">'
        + '<div class="search-result-info">'
        +   '<div class="search-result-name">' + _esc(r.name) + '</div>'
        +   '<div class="search-result-meta">' + _esc(meta.join(' · ')) + '</div>'
        + '</div>'
        + '<div class="search-result-add">+ Add</div>'
        + '</div>';
    }).join('') + '</div>';
    Array.prototype.forEach.call(resultsEl.querySelectorAll('.search-result[data-place-id]'), function(el){
      el.addEventListener('click', function(){
        addCompetitor(el.getAttribute('data-place-id'), el.getAttribute('data-name'));
      });
    });
  } catch (e) {
    resultsEl.innerHTML = '<div class="search-results"><div class="search-result"><div class="search-result-info"><div class="muted">Error: ' + _esc(e.message) + '</div></div></div></div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Search';
  }
}

async function addCompetitor(placeId, name) {
  if (!COMP_CLIENT_ID) return;
  try {
    var res = await fetch(API + '/api/competitors/', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        client_id: COMP_CLIENT_ID,
        competitor_name: name,
        google_place_id: placeId,
      }),
    });
    if (!res.ok) {
      var err = await res.json().catch(function(){return {};});
      throw new Error(err.detail || 'Failed to add');
    }
    document.getElementById('comp-search-results').innerHTML = '';
    document.getElementById('comp-search-input').value = '';
    await loadCompetitors(COMP_CLIENT_ID);
  } catch (e) {
    alert('Could not add competitor: ' + e.message);
  }
}

async function removeCompetitor(competitorId) {
  if (!confirm('Stop tracking this competitor?')) return;
  try {
    await fetch(API + '/api/competitors/' + competitorId, {method: 'DELETE'});
    await loadCompetitors(COMP_CLIENT_ID);
  } catch (e) {
    alert('Could not remove: ' + e.message);
  }
}

async function refreshCompetitors() {
  if (!COMP_CLIENT_ID) return;
  var btn = document.getElementById('comp-refresh-btn');
  btn.disabled = true; btn.textContent = 'Refreshing...';
  try {
    await fetch(API + '/api/competitors/refresh/' + COMP_CLIENT_ID, {method: 'POST'});
    await loadCompetitors(COMP_CLIENT_ID);
  } catch (e) {
    alert('Refresh failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Refresh data';
  }
}

function _renderCompList(competitors) {
  var listEl = document.getElementById('comp-list');
  if (!competitors || competitors.length === 0) {
    listEl.innerHTML = '<div class="empty">No competitors yet — search above to add one.</div>';
    return;
  }
  listEl.innerHTML = competitors.map(function(c){
    return '<div class="comp-row">'
      + '<div><div class="comp-name">' + _esc(c.name) + '</div>'
      +   (c.last_fetched_at ? '<div class="comp-meta">Updated ' + _esc(new Date(c.last_fetched_at).toLocaleDateString()) + '</div>' : '<div class="comp-meta">Awaiting first refresh</div>')
      + '</div>'
      + '<div class="comp-rating">★ ' + _fmtRating(c.rating) + '</div>'
      + '<div class="muted">' + _fmtCount(c.review_count) + ' reviews</div>'
      + '<button class="comp-remove" title="Remove" onclick="removeCompetitor(\'' + _esc(c.competitor_id) + '\')">✕</button>'
      + '</div>';
  }).join('');
}

function _renderCompTable(report) {
  var wrap = document.getElementById('comp-table-wrap');
  var rows = (report.competitors || []).slice();
  var hasAny = rows.length > 0 || (report.client && report.client.rating != null);
  if (!hasAny) {
    wrap.innerHTML = '<div class="empty">Add a competitor to see how you compare.</div>';
    return;
  }
  var clientRow = report.client || {};
  var allRows = [Object.assign({}, clientRow, {is_self: true})].concat(rows);
  var tbody = allRows.map(function(r){
    var nameCell = '<div class="cmp-name-cell">' + _esc(r.name || '—') + (r.is_self ? '<span class="self-badge">You</span>' : '') + '</div>';
    var ratingCell = '<span class="comp-rating">★ ' + _fmtRating(r.rating) + '</span>' + _delta(r.rating_change);
    var reviewCell = _fmtCount(r.review_count) + _delta(r.review_count_change);
    return '<tr class="' + (r.is_self ? 'is-self' : '') + '">'
      + '<td>' + nameCell + '</td>'
      + '<td>' + ratingCell + '</td>'
      + '<td>' + reviewCell + '</td>'
      + '</tr>';
  }).join('');
  wrap.innerHTML = '<table class="cmp-table">'
    + '<thead><tr><th>Business</th><th>Rating (Δ wk)</th><th>Reviews (Δ wk)</th></tr></thead>'
    + '<tbody>' + tbody + '</tbody>'
    + '</table>';
}

async function loadCompetitors(clientId) {
  COMP_CLIENT_ID = clientId;
  try {
    var [listRes, reportRes] = await Promise.all([
      fetch(API + '/api/competitors/' + clientId),
      fetch(API + '/api/competitors/report/' + clientId),
    ]);
    if (listRes.ok) {
      var listData = await listRes.json();
      // map to the field names the table renderer expects
      var enriched = (listData.competitors || []).map(function(c){
        return {
          competitor_id: c.id,
          name: c.competitor_name,
          rating: c.rating,
          review_count: c.review_count,
          last_fetched_at: c.last_fetched_at,
        };
      });
      _renderCompList(enriched);
    } else {
      document.getElementById('comp-list').innerHTML = '<div class="empty">Could not load competitors.</div>';
    }
    if (reportRes.ok) {
      var reportData = await reportRes.json();
      _renderCompTable(reportData);
    } else {
      document.getElementById('comp-table-wrap').innerHTML = '<div class="empty">Could not load comparison.</div>';
    }
  } catch (e) {
    document.getElementById('comp-list').innerHTML = '<div class="empty">Error loading competitor data.</div>';
    document.getElementById('comp-table-wrap').innerHTML = '';
  }
}

// ── Init ─────────────────────────────────────────────────────
(function init() {
  var token = localStorage.getItem('client_token');
  if (!token) return;
  var payload = _parseJwt(token);
  if (!payload || payload.exp * 1000 < Date.now()) {
    localStorage.removeItem('client_token');
    return;
  }
  showDashboard({
    client_id:     payload.client_id,
    business_name: payload.business_name,
    email:         payload.email,
  });
})();
</script>
